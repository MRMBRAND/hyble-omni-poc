jobs:
  - job: set_build_version
    displayName: "Set build version"
    steps:
      - checkout: self
        fetchDepth: 0

      - task: gitversion/setup@0
        displayName: Install GitVersion
        inputs:
          versionSpec: "5.12.0"

      - task: gitversion/execute@0
        displayName: Use GitVersion
        inputs:
          updateAssemblyInfo: false
          useConfigFile: true
          configFilePath: "./GitVersion.yml"

      - pwsh: |
          $version = "$(fullSemVer)".ToLower()
          echo "##vso[build.updatebuildnumber]$version"
          echo "##vso[task.setvariable variable=BuildNumber]$version"
        name: ResettingBuildNumber
        displayName: "Set Build Number to Semantic Version"

      - script: |
          echo "Setting \`$\`(BuildNumber): $(BuildNumber) to stage BuildVersionName"
          echo "##vso[task.setvariable variable=BuildVersionName;isOutput=true]$(BuildNumber)"
        name: BuildResult
        displayName: "Set stage dependency build number"
